<!DOCTYPE html>
<html lang="en">
	
	<head>
		<!-- 设置字符集 -->
		<meta charset="utf-8">
		<!-- 将视区视为具有设备的物理宽度相同的宽度 -->
		<meta name="viewport" content="width=device-width,initial-scale=1.0">
		<!-- 引入外部css文件 -->
		<link rel="stylesheet" href="./index.css">
		<!-- 设置标题 -->
		<title>login</title>
		<!-- 设置导航栏图像 -->
		<link rel="icon" href="../image/dh.ico">
	</head>

	<body>
		<section>
			<div class="color"></div>
        	<div class="color"></div>
        	<div class="color"></div>
        	<div class="color"></div>
        	<div class="color"></div>
			<div class="box">
				<div class="circle" style="--x:0"></div>
	            <div class="circle" style="--x:1"></div>
	            <div class="circle" style="--x:2"></div>
	            <div class="circle" style="--x:3"></div>
	            <div class="circle" style="--x:4"></div>
	            <div class="container">
					<div class="form">
						<span class="sign_head">登录</span>

						<div class="inputBox">
							<input type="text" placeholder="姓名">
						</div>

						<div class="inputBox">
							<input type="password" placeholder="密码">
						</div>

						<div class="inputBox">
							<input type="submit" value="登录">
						</div>

						<p class="forget">忘记密码<a href="#">点这里试试</a></p>
						<p class="forget">没有账户<a href="#">注册吧</a></p>
					</div>
				</div>
				
			</div>
		</section>




	</body>




</html>
